# Self-hosted deployment. `docker compose up -d` behind Caddy for auto-HTTPS.
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATA_DIR: /app/data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      REDACT_BEFORE_LLM: ${REDACT_BEFORE_LLM:-true}
      RETENTION_DAYS: ${RETENTION_DAYS:-0}
    volumes:
      - ./data:/app/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
